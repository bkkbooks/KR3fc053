body:
  text: 道去極度當仍用四分術數置冬至夜漏五十五刻以日法乘之得八萬一百三十五以二百除之得四百不盡一百三十五亦得一故以四百一為率以百刻乘之滿日法得一刻不盡什之求分以課所近節氣夜漏未盡以算上為日推沒置入紀年外所求以餘數乘之滿紀法為積沒有餘加盡積為一注曰有餘加積沒一故所得為冬至後沒以會通乘之滿沒法為大餘不盡為小餘大餘命以紀算外冬至後沒日求次沒加大餘六十九小餘六十四滿其法從大餘無分為滅推日度以紀法乘積日滿周天去之餘以紀法除之所得為度命度以牛前五度起注曰斗二十一度也宿次除之不滿宿即天正朔夜半日所在注曰天正下舊脫朔字求次日加一度經斗除分分少損一度為紀法加焉推月度以月周乘積日滿周天去之餘滿紀法為度不盡為分命如上則天正朔夜半月所在度求次月小月加度二十二分二百五十八注曰以月周七千八
