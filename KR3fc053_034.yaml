body:
  text: 分以通數乘章歲分之餘滿周法亦得紀法分分滿紀法從度以盈加縮減本夜半度及餘年為定度求變衰法以人厯日餘乘列衰如周法得一不盡為餘即各知其日變衰也求次厯以周虛乘列衰注曰次厯日餘皆周虛之積故以周虛乘如周法為常數厯竟輒以加變衰滿列衰去之注曰變舊誤率下變衰也同周虛滿周法成日故變衰滿列衰去之轉為次厯變衰也求次日夜半定度以變衰進加退減厯日轉分分盈不足章歲出入度也通變乘分及餘而日轉加夜半定度為次日也竟厯不直周日減餘千三十八注曰如甲日夜半月行十三度七分人厯二十六日日餘五千三百三十二乙日夜半月行二十六度十四分入厯日空日餘二千二十九是為不直周日以求月夜半定度法推其定度以甲日日餘乘二十七日損率十九得一十萬一千三百八如周法五千九百六十九而一得十六餘五千八百四以減二十七日縮積三十一得甲日縮積十四餘一百六十五以減甲日夜半月行度得甲日夜半定行十二度十一分餘五千八百四又以乙日日餘乘一日益率二十二得四萬四千六百三十八周法而一得七餘二千八百五十五即為乙日盈積以加乙日夜半月行度得乙日夜半定行二十七度二分餘二千八百五十五以變衰推之以甲日日餘乘二十七日列衰三得一萬五千九百九十六周法而一得甲日變衰二餘四千五十八以加二十七日日轉度分十
