body:
  text: 合月法十二萬七千七百一十八日度法三百九十五萬九千二百五十八朔大餘二十三注曰以通法乘合月數得五十五萬九千三百三十八為積日分以日法除之得三百八十三為積日不盡為朔小餘以六十去積日餘為大餘以朔小餘轉減日法餘為朔虛分朔小餘一千三百七入月日十五注曰以通法乘月餘得二十七億八千八百一十二萬七千八百二十六以合月法乘朔小餘得一億六千六百九十二萬七千四百二十六并之得二十九億五千五百五萬五千二百五十二以會數約之得六千二百八十七萬三千五百一十六為日分以日度法除之得入月日不盡為日餘日餘三百三十餘萬四千四十六注曰三下當作四十又四千下當有六百二字朔虛分一百五十升分九十七萬四千六百九十度數三十三注曰以周率減日率餘六百一十九為度餘分以周天乘之得一億三千三百一十六萬五千四百七十為積度分以日度法除之為度數不盡為度餘度餘二百五十萬九千九百五十六火周率三千四百七日率七千二百七十一合月數二十六注曰月分一百七十萬八千六百八十五
