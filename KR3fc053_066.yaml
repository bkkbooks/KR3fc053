body:
  text: 入紀月副以章閏乘之滿章月得一閏以減入紀月餘以歲中去之命以天正算外合月也其在閏交際以朔御之推星合月朔日以通法乘入紀月滿日法得一為積日不盡為小餘以六十去積日餘為大餘命以所入紀算外星合朔日也注曰此推合月朔日術舊脫今依景初術補推入月日以通法乘月餘合月法乘朔小餘并以會數約之所得滿日度法得一則星合入月日也不滿為日餘命以朔算外推星合度以周天乘度分滿日度法得一度不盡為餘命度以牛前五度起右求星合求後合月以月數加月數以月餘加月餘滿合月法得一月不滿歲中注曰滿上舊衍減字即合其年滿去之有閏計焉餘為後年再滿在後二年金水加晨得夕加夕得晨求後合朔日注曰後字今增以朔大小餘加合月大小餘上成月者又加大餘二
