body:
  text: 十三日十二度八分二退加損十八盈六十四二百三十六十四日十二度六分一退加損二十盈四十六二百三十四十五日十二度五分一進減損二十一盈二十六二百三十三十六日十二度六分二進減損二十損不足及五為益而損初二十茲不足盈五縮初二百三十四十七日十二度八分三進減益十八縮十五二百三十六十八日十二度十一分四進減益十五縮二十三二百三十九十九日十二度十五分三進減益十一縮四十八二百四十三二十日十二度十八分四進減益八縮五十九二百四十六二十一日十三度三分四進減益四縮六十七二百五十二十二日十三度七分四進加損縮七十一二百五十四二十三日十三度十一分四進加損四縮七十一二百五十八二十四日十三度十五分四進加損八縮六十七二百六十二二十五日十四度四進加損十二縮五十九二百六十六二十六日十四度四分三進加損十六縮四十七二百七十二十七日十四度七三厯初進加分三天周日損十九縮三十一二百七十三周日十四度九分少進加損二十一縮十二二百七十五注曰日轉度分者每日月行定度也列衰者其日與次日行分之差也列差有進退加減者以之加減日轉度分曰進退以之加減損益日加減異其名所以別其用每以加減其日得次日也二十七日列衰傳寫錯誤依陰陽厯衰之例及算數推之當云三進加厯初大周日損益率者小周與其日月行分之差也小周少於月行分在盈為益在縮為損多於月行分在盈為損在縮為益八日損率下舊本誤衍四字錢
