body:
  text: 李銳述并注光和中榖城門侯劉洪始悟四分於天疏濶皆斗分太多故也造乾象法又制遲疾術以步月行兼考月行陰陽交錯於黃道表裏放於太初四分轉精密矣建安元年鄭康成受其法以爲窮幽極微又加注釋焉劉氏在蜀不見改術當是仍用漢四分法吳中書令闞澤受乾象法於東萊徐岳字公河又加解注中常侍王蕃以洪術精妙用推渾天之理以制儀象及論故黃武二年春正月改四分用乾象注曰見吳志至於吳亡晉渡江後景初術漸差其推五星尤疏闊更用乾象五星法代之自黃初以後皆斟酌乾象以求折衷洪術爲推步之師表云注曰巳上采三國志晉書宋書上元巳丑以來至建安十一年景戊歲積七千三百七十八年注曰巳下見晉書錢詹事日景者丙也避唐諱改乾法千一百七十八注曰錢詹事日倍紀法爲乾法銳案歲分月分日名俱終之歲數也會通七千一百七十一注曰以周天與餘數求等得三十以約周天得會通以約餘數得沒法以沒法除會通得六十九日百三分日之六十四而一沒紀法五百八十九注曰三十一章爲紀歲分月分俱終之歲數也
