body:
  text: 周天二十一萬五千一百實施注曰即一紀日數也以紀法除之得三百六十五五百八十九分之百四十五為問天度數亦為一歲日數此百四十五即斗分也以月周除之得二十七七千八百七十四分之二千五百三十二為月行周天日數通法四萬三千二十六注曰以周天與紀月求等得五以約周天得通法以約紀月得日法以日法除通法得二十九千四百五十七分之七百七十三為一月日數通數三十一注曰一紀章數也日法千四百五十七歲中十二餘數三千九十注曰數舊誤歲錢詹事曰當做數鋭案以紀法除之得五五百八十九分之百四十五為一歲大小餘數章歲十九沒法百三章閏七會歲四十七注曰一會章數也會歲八百九十三注曰四十七章為一會章月二百三十五會率千八百八十二注曰以會數除之得歲有再食八百九十三分之十六朔望合數九百四十一注曰半會率得朔望合數蝕日月餘在此數已下朔則日食望則月食已上望則月食後月朔則日食月餘盡則日食既月餘九百四十一則月食既故名朔望合數
