body:
  text: 百七十四乘小月二十九日得二十二萬八千三百四十六滿周天二十一萬五千一百三十去之餘一萬三千二百一十六以紀法五百八十九除之得度不盡為分大月又加一日度十三分二百一十七滿法得一度其冬下旬夕在張心署之推合朔度以章歲乘朔小餘滿會數為大分不盡小分注曰本當以日法為所有率紀法為所求率朔小餘為所有數而今歲之得大分今以通數約日法即會數以通數約紀法即章歲故以章歲乘滿會數得一以大分從朔夜半日分滿紀法從度命如前天正合朔日月所共會也求次月加度二十九大分三百一十二小分二十五注曰舊脫此五字置一月小餘七百七十三以章歲乘之得一萬四千六百八十七以會數除之得大分不盡為小分小分滿會數從大分大分滿紀法從度經斗除大分求弦望日所在度加合朔度七分二百二十五小分十七半注曰置弦小餘五百五十七半以章歲乘之得一萬五百九十二半以會數除之得大分不盡為小分大小分及度命如前則上弦日所在度又加得望下弦後月合求弦望月行所在度加合朔度九十八大分四百八小分四十一注曰置周天二十一萬五千一百三十以四除之得五萬三千七百八十二半以紀法五百八十九除之得九十一度大分一百八十三半以大分半為小分二十三半又以七度大分
