body:
  text: 後分法九百一十四為微分鋭案會率為一會食數日行自此交至彼交為一食是一食為日行交半周并二食得日行交一周半會率得朔望合數為一會日行交周數以加會月得差率為一會月行交周數則此朔望合數又為一會月行交周數除去一月一周天外過周及日之積周以周天乘之則為一會月行交周數除去一月一周天外過周及日之積度分以會月為所以率過周及日之積度分為所求率一月為所有數而今有之得一月月行交一周天外過周及日之積度分也通數乘合數餘如會數而一退分也以從月周為日進分會數而一為差率也注曰會歲為一會日行周數朔望合數為一會日行交周數相減餘四十八為一會交退行周數通數乘之會數而一者變會從紀也會數為一會章數為所有率四十八為一會交退行周數為所求率通數為一紀章數為所有數以所求率乘之得一千四百八十八以所有率除之得三十一又四十七之三十一為所求一紀交退行周數約而言之即為一日交退行周數故曰退分也月周為一紀月行周數以一紀交退行周數并之得七千九百五又四十七之三十一為一紀月行交周數即為一日月行交之積度分在交為退在月則為進故又為日進分以紀法除之得十三五百八十九分之二百四十八又四十七之三十一為一日月行交度數會數而一為差率也會數下當有乘之通數四字會數乘之通數而一者又變紀從會也置七千九百五四十七之三十一以會數通分內子得三十七萬一千五百六十六以通數除之得一萬一千九百八十六為差率此差率即為一會月行交周數又為一日月行交之積度分以會歲除之得十三八百九十三分之三百七十七亦為一日月行交度數陰陽厯衰損益率兼數一日一減益十七初二日限餘千二百九十微分四百五十七此為前限一減益十六十七三日三減益十五三十三
