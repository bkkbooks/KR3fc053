body:
  text: 求次月加二日日餘二千五百八十微分九百一十四注曰置朔合分定微分以月周除之得二日日餘二千五百八十微分九百一十四如法成日滿十三去之除餘如分日陰陽厯竟互入端入厯在前限餘前後限餘後者注曰後限下舊脫餘字月行中道也注曰月行中道則有食求望者因合朔入厯日餘分加一日日餘一千二百九十微分四百五十七朔入陽厯則望入陰厯則望入陽厯日滿十三餘滿分日去之朔入陽厯望亦入陽厯朔入陰厯望亦入陰厯求朔望定數各置八遲疾厯盈縮大小分會數乘小分為微分注曰為微分舊誤為徵案微分法為會數自乘之數小分本以會數為母故以會數乘之為微分盈減縮加陰陽日餘注曰此加減與遲疾術同亦求朔望則盈減縮加求夜半則盈加縮減日餘盈不足日進退日而定注曰以月周進退日以定日餘乘損益率如月周得一以損益兼數注曰舊本脫兼字為加時定數推夜半入厯以差率乘朔小餘如微分法得一注曰微分法為五約會月之數差率為一日月行交之會歲分日法為五紀月之數月周與日進分相加為一日月行交之紀法分今此朔小餘為不滿日法之分以微分法為所有率差率為所求率朔小餘為所有數而今有之所得為朔小餘所變之月行交紀法分也以減入厯日餘不足加月周而減之却一日注曰舊脫此三字却得分日加其分以會數約微分為
