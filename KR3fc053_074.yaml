body:
  text: 八百六十八分行星五十五度百二十四萬二千八百六十分半而與日合凡一終七百七十九日九十七萬三千一十三分行星四百一十四度四十七萬八千九百九十八分土晨與日合伏順十六日百一十二萬二千四百二十六分半行星一度百九十萬五千八百六十四分半而晨見東方在日後順日行三十五分之三八十七日半行七度半留不行三十四日旋逆日行十七分之一百二日退六度復留二十四日而順日行三分八十七日半行七度半在日前夕伏西方十六日百一十二萬二千四百二十六分半行星一度百九十萬五千八百六十四分半而與日合也凡一終三百七十八日十六萬六千二百七十二分行星十二度百七十三萬三千一百一百四十八分金晨與日合伏逆五日退四度而晨見東方在日後逆日行五分度之三十日退六度留不行八日旋順遲日行四十六分之三十三四十六日行三十三度而順疾日行一度九十一分之十五九十一日行一百六度更順益疾日行一度九十一分之二十二九十一日行百一十三度在日後晨伏東方順四十一
  hash: sha256:dae96e808bff24142040082b88c1ac46e6f032d9f881682abf19a1bd5fcffdec
