body:
  text: 會月萬一千四十五注曰以會率除之得五月千八百八十二分月之千六百三十五而一食紀月七千二百八十五元月一萬四千五百七十月周七千八百七十四注曰一紀月行周數也以紀法除之得十三五百八十九分之二百一十七為一日月行度數小周二百五十四推入紀置上元盡所求年以乾法除之不滿乾法以紀法除之餘不滿紀法者注曰謂乾法之餘不滿紀法入內紀甲子年也滿法去入外紀甲午年也注曰甲子甲午紀首日名因為紀名也乾法為二紀并數故有內外紀推朔置入紀年外所求注曰外所求減一也以章月乘之章歲而一所得為定積月不盡為閏餘十二以上歲有閏注曰有舊誤不閏餘十二加歲閏七滿法成月故有閏以通法乘定積月為假積日滿日法為定積日不盡為小餘以六旬去積日為大餘命以所入紀算外所求年天正十一月朔日也注曰凡法同前術者已説在前術此不更詳它術放此求次月加大餘二十九小餘七百七十三小餘滿日
