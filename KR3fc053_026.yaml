body:
  text: 詹事日月行一轉惟八日二十二日無所損益然由益而損正在此日故不云損若干但云損也損下不當有四字十六日損益下注亦有舛誤以意求之當云損不足反減五為益謂盈有五而損二十故不足盈縮積者其日之盈縮積也積疾曰盈積遲曰縮八日已後月行漸遲而積尚存故一日至十六日皆為盈二十二日已後月行漸疾而積遲尚存故十六日至周日皆為縮月行分者每日月行定分以章歲通日轉度分即月行分也又案景初元嘉正光諸術周日下並有小分之數乾象術無之當是省文或傳寫脫漏也今依率推之置周日縮積十二即為周日分損率以周虛二千六百六十六乘之得三萬一千九百九十二以周日分三千三百三除之得九三千三百三分之二千二百六十五子母各三約之即一千一百一分之七百五十五此一千一百一即少大法則七百五十五即少大分也是周虛損率為九又少大分七百五十五與周日分損率十二相加得二十一少大分七百五十五為周日損率以周日損率加小周二百五十四得二百七十五少大分七百五十五為周日月行分以章歲十九除之得十四度九分少大分七百五十五以周日日轉度分此少大分滿少大法從分分滿章歲從度又以少大分變為餘置少大分七百五十五以周日法五千九百六十九乘之得四百五十萬六千五百九十五以少大法除之得四千九十三為餘不盡二百二為少大分是周日日轉度分又為十四度九分餘四千九十三少大分二百二損益率又為二十一餘四千九十三少大分二百二月行分又為二百七十五餘四千九十三少大分二百二此少大分滿少大法從餘餘滿周日法從分分滿章歲從度已上皆周日之數今周虛為人次厯空日月餘求益率者以周日法與一日益率二十二率之置周虛以二十二乘之得五萬八千六百五十二以周日法除之得九餘四千九百三十一為所求益率也置二十七日損率十九以列衰三加之得二十二以周日縮積反減之餘十又減餘一千三十八亦得所求益率九餘四千九百三十一故下文云不直周日減餘千三十八也又置周日損率二十一餘四千九十三少大分二百二以周日縮積十二反減之餘九及餘四千九十三少大分二百二加餘八百三十七少大分八百九十九少大分滿法從餘
