body:
  text: 以十二乘小餘滿其法得一度辰注曰度字衍數從子起算外朔弦望以定小餘推漏刻以百乘小餘滿其法得一刻不盡什之求分課所近節氣起夜分盡夜上水爲盡以所近言之推有進退進加退減所得也進退有差起分度後二率四度轉增少少每半者三而轉之差滿三止厯五度而減如初注曰此變赤道度從黃道度之術今本并連上文非是起分度後二當云起二分度後率四度轉增少者少爲四分之一二分前後黃道度多赤道度少赤道四度黃道則四度四分之一也少每半者三而轉之者前既增少又增得半自少而增至半又增者則三度而增之爲太故日三而轉之既云四度轉增少又云三而轉之者張衡混儀日每一氣者黃道進退一度焉今別一氣十五度爲四度者三三度者一凡增少者四則一氣正得增一度也差滿三止者黃赤道差極於三度也厯五度而減如初者二至前後黃道度少赤道度多故須減之前率四度增少今亦率四度減少故曰如初也厯五度者分至相去計九十一度有竒分後厯四十五度而增三度今先厯五度而減少以後依率減之則至前亦四十五度而減三度也月行三道術月行遲疾注曰一日月行十三度十九分度之七此平率也不足十三度七分爲遲過于十三度七分爲疾周進有恒注曰月行遲疾一周自度端復至度端又過三度有奇是一周之間有所進也所進有常數故曰周進有恒會數從天地凡數乘餘率自乘如會數而一爲過周分注曰天地凡數者易曰凡天地之數五十有五也以會數
