body:
  text: 四十七并五十五得一百二餘率者二十九也以二十九自乘得八百四十一以一百二乘之得八萬五千七百八十二以會數四十七除之得一千八百二十五四十七分之七爲過周分乃遲疾一周過於周天之數也以紀法五百八十九除之得三五百八十九之五十八又四十七之七爲過周度數此過周分若今法之最高行矣以從周天月周除之厯日數也注曰置周天二十一萬五千一百三十以過周分一千八百二十五四十七分之七加之得二十一萬六千九百五十五四十七分之七以月周七千八百七十四除之得二十七七千八百七十四分之四千三百五十七四十七分之七爲厯日數又置二十一萬六千九百五十五四十七分之七以會數通分內子得一千一十九萬六千八百九十二以倍通數六十二除之得十六萬四千四百六十六則厯周也置月周亦以會數乘之得三十七萬七十八倍通數除之得五千九百六十九則周日法也以除厯周得二十七五千九百六十九分之三千三百三亦爲厯日數遲疾有衰其變者勢也注曰衰差也遲疾之差也謂遲疾有衰敘由遲變疾由疾變遲皆自然之勢計一周之間入厯一日極疾自一日已後其疾漸減至八日而平八日已後漸遲至十五日極遲自十五日已後其遲漸減至二十二日而復平二十二日已後復漸疾至周日人次立復極疾而一周以衰減加月行率爲日轉度分注曰衰列衰也一日月行率十三度七分遲疾一周惟八日二十二日月行不遲不疾正得中平之數即以月行率爲日轉度分其八日已前二十二日已後以列衰累加之八日以後二十二日以前以列衰累減之爲每日日轉度分衰左右相加爲損益率注曰八日二十二日日傳度分與月行率等其損益率空其前後皆以列衰累加之爲每日損益率故曰左右相加益轉相益損轉相損盈縮積也注曰一日盈初十六日縮初以損益率累益累損之爲每日盈縮積半小周乘通數而一以厯周減焉爲朔行分也注曰半小周二百五十四得一百二十七錢詹事曰半小周乘通法得五百四十六萬四千三百二如通數而
