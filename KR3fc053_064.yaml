body:
  text: 朔小餘得一億六千九百七十九萬六千四百七并之得九十二億六千二百五十二萬四千一十三會數約之得日分一億九千七百七萬四千九百七十九日餘六百四十一萬九百六十七朔虛分六百八十四升斗一百六十七萬六千三百四十五度數五十七注曰積度分三億九千四百五十四萬八千四百二十度餘六百四十一萬九百六十七推五星置上元盡所求年以周率乘之滿日率得一名積合不盡為合餘以周率除之得一星合往年二合前往年無所得合其年合餘減周率為度分金水積合竒為晨耦為夕注曰上元金水起夕合也晉書志載徐嶽議曰水以黃初二年十一月十七日癸未晨見乾象以十一月十三日巳卯見先四日今依術推之上元巳丑以來盡黃初二年辛丑積七千三百九十三年積合四萬六千六百三合餘五百七十一積月九萬一千四百三十九月餘二萬七千六百六十九入甲子紀月四千一十九閏月一百一十九閏餘一百六十八入歲月空積日一十一萬八千六百八十三朔大餘三小餘三百六十三入月日三日餘六百五十九萬七千七百二十六水最合伏九日見東方得十一月丁卯朔四日庚午水晨合十三日巳卯晨見與嶽議合是竒為晨也推星合月以月數月餘合乘積合滿合月法從月不盡為月餘以紀月去積月注曰以紀月除去積月所得耦為入甲子紀竒為入甲午紀餘為
