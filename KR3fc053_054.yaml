body:
  text: 乘月法之分故滿日度法得一五星度數度餘減多爲度餘分以周天乘之以日度法約之所得爲度不盡爲度餘過周天去之及什分法曰五星舊誤生錢詹事曰葢星字爛脫止存下半又脫去五字去之及什分去舊誤法升舊誤十錢詹事日不火土以周率減日率餘爲度餘分金水周率多於日率卽以日率爲度餘分法當作去十當作斗銳案火一終行度過於周天故須去之紀月七千二百八十五章閏七章月二百三十五歲中十二通法四萬三千二十六日法千四百五十七會數四十七周天二十一萬五千一百三十升分一百四十五木周率六千七百二十二日率七千三百四十一合月數十三注曰以章月乘日率得一百七十二萬五千一百三十五爲月分以合月法除之得合月數不盡爲月餘月餘六萬四千八百一
