body:
  text: 一得十七萬六千二百六十七又三十一分之二十五以厯周減之餘一萬一千八百一是為朔行大分又餘二十五為小分也鋭案厯周為遲疾一周之積日分滿周日法成一日通法為一月之積日分滿日法成一日兩數分母不同欲令相減法須變之先驗周日法為會數乘月周倍通數除之之數凡數先乘後除先除後乘所得不異今先以倍通數除月周得小周之半以乘會數亦得周日法是周日法又為半小周乘會數之數又驗日法為通數乘會數之數則以半小周乘日法以通數除之即得周日法故此術以半小周乘通法以通數除之即變一月之積日法分為一月之積周日法分與厯周分粗細相等故即以厯周減之所減之餘乃遲疾一周少於一月之積分也日轉度分列衰損益率盈縮積月行分一日十四度十分一退減益二十二盈初二百七十六二日十四度九分二退減益二十一盈二十二二百七十五三日十四度七分三退減益十九盈四十三二百七十三四日十四度四分四退減益十六盈六十二二百七十五日十四度四退減益十二盈七十八二百六十六六日十三度十五分四退減益八盈九十二百六十二七日十三度十一分四退減益四盈九十八二百五十八八日十三度七分四退加損盈百二二百五十四九日十三度三分四退加損四盈百二二百五十十日十二度十八分三退加損八盈九十八二百四十六十一日十二度十五分四退加損十一盈九十二百四十三十二日十二度十一分三退加損十五盈七十九二百三十九
