body:
  text: 小分即朔日夜半入厯求次日加一日日餘三十一小分三十一小分如會數從餘注曰日餘三十一小分三十一即日進分也餘滿月周去之又加一日厯竟下日餘滿分日去之為入厯初也不滿分日者直之加餘二千七百二小分三十一為入次厯注曰置月周加日進分得七千九百五小分三十一以分日五千二百三減之餘二千七百二小分三十一求夜半定日以通數乘入遲疾厯夜半盈縮及餘餘滿周半為小分注曰舊脫周字盈縮餘本以周法為母周法為周半乘會數之數故以周半除餘所得以會數為母以盈加縮減入陰陽日餘日盈不足注曰當云日餘盈不足或日字衍以月周進退日而定也以定日餘乘損益率如月周得一以損益兼數注曰率如巳下九字今增為夜半定數也求昏明數以損益率乘所近節氣夜漏二百而一為明以減損益率為昏而以損益夜半數為昏明定數求月去極度置加時若昏明定數以十二除之為度其餘三而一為少注曰三下舊衍日字不盡一為強二少弱也所得為月去黃道度也其陽厯以加日所在黃道厯去極度陰厯
