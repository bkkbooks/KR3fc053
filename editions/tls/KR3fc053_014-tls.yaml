body:
  text: 二百二十五小分十七半加之得此度及大小分數大小分及度命如前合朔則上弦月所在又加得望下弦後月合求日月昏明度日以紀法月以月周乘所近節氣夜漏二百而一爲明分日減紀法月以減月周餘爲昏分各以加夜半如法爲度推月蝕置上元年外所求以會歲去之其餘年以會率乘之如會歲爲積蝕有餘加積一會月乘之如會率爲積月不盡爲月餘以章閏乘餘年滿章歲爲積閏注曰章歲舊誤章月錢詹事曰當作章歲以減積月餘以歲中去之不盡數起天正求次蝕加五月月餘千六百三十五滿會率得一月注曰滿上舊重五字錢詹事曰衍月以望推卦用事日因冬至大餘倍其小餘坎用事日也加小餘千七十五滿乾法從大餘中孚用事日也注曰錢詹事曰六十四卦用事直日之法本之京房其法以坎離震兌用事在分至之首得八十分日之七十三餘卦皆六日八十分日之七惟頣晉井大畜皆五日八十分日之十四較它卦少七十三分所少之數即坎離震兌用事數也乾象術推卦用事以滿乾法千一百七十八爲日千一百七十八分之千七十五即八十分之七十三強也千一百七十八分之百三即八十分之七弱也銳案六日七分四分術之率也四分術一氣大餘十五小七
