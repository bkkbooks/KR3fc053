body:
  text: 二十以加二十七日損率得甲日變損率二十一餘三千二十以甲日縮積反減之亦得乙日盈積七餘二千八百五十五直周日者亦加餘八百三十七少大分八百九十九如丙日丁日戊日八厯如上求得丙日縮積二十二餘三千六十七戊日盈積十九餘三千八百九十三又求得丙日變衰一餘二千二十九以加二十七日損率十九得丙日變損率二十餘二千二十九而轉減丙日縮積得丁日縮積二餘一千三十八又置週日損率二十一餘四千九十三少大分二百二加餘八百三十七少大分八百九十九得二十一餘四千九百三十一而以丁日縮積反減之亦得戊日盈積十九餘三千八百九十三求昏明月度以厯月行分乘所近節氣夜漏二百而一爲明分注曰舊脫明字以減月行分爲昏分分如章歲爲度以通數乘分以昏後以明加夜半定度注曰以昏下有舛誤當云以加夜半定度爲昏明定度餘分半法以上成注曰成下當有一字不滿廢之求月行遲疾注曰題上事也月經四表注曰四表東南西北也謂黃道之東南西北尚書曰光被四表出入三道注曰三道內外中道也外道爲陽厯在黃道南內道爲陰厯在黃道北交錯分天以月率除之爲厯之日注曰日月道交錯分天半爲外道半爲內道置周天二十一萬五千一百三十半之得十萬七千五百六十五則厯周也以月周七千八百七十四除之得十三七千八百七十四分之五千二百三爲陰陽厯各一終之日數此不成日之分五千二百三則分日也月率當是月周之誤周天乘朔望合和會月而一朔合分也注曰錢詹事曰以周天乘朔望合數得二億二百四十二萬七千三百三十如會月而一得一萬八千三百二十八即朔合分也又餘萬一千四十五分之四千五百七十以五約之爲二千二百九分之九百一十四故以二百九爲
