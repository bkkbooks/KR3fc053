body:
  text: 朔小餘一千一百二十九入月日二十七注曰通數乘月餘得六十五億五千二百五十五萬八千六百一十八合月法乘朔小餘得一億九千三百五十三萬九百二十二并之得六十七億四千六百八萬九千五百四十會數約之得日分一億四千三百五十三萬三千八百二十日餘五萬六千九百五十四朔虛分三百二十八升分一百三十萬八千一百九十度數二百九十二注曰以周天乘日率得積度分十五億五千一百七十三萬二千六百九十度餘五萬六千九百五十四水周率一萬一千五百六十一日率一千八百三十四合月數一注曰月分四十三萬九百九十月餘二十一萬一千三百三十一合月法二十一萬九千六百五十九日度法六百八十萬九千四百二十九朔大餘二十九朔小餘七百七十三入月日二十八注曰通法乘月餘得九十億九千二百七十二萬七千六百六合月法乘
