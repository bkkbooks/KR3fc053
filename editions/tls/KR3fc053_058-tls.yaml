body:
  text: 月餘二萬五千六百二十七合月法六萬四千七百三十三日度法二百萬六千七百二十三朔大餘四十七注曰積日分一百一十一萬八千六百七十六積日七百六十七朔小餘一千一百五十七入月日十二注曰通法乘月餘得一十一億二百六十二萬七千三百二合月法乘朔小餘得七千四百八十九萬六千八十一并之得一十一億七千七百五十二萬三千三百八十三會數約之得日分二千五百五萬三千六百八十九日餘九十七萬三千一十三朔虛分三百升分四十九萬四千一十五度數四十八注曰度餘分三千八百六十四積度分四億三千一百二十六萬二千三百二十積度四百一十四度餘四十七萬八千九百九十八以周天三百六十五度什分四十九萬四千一十五減之餘爲度數度餘度餘一百九十九萬一千七百六土周率三千五百二十九日率三千六百五十三合月數十二注曰月分八十五萬八千四百五十五月餘五萬三千八百四十三
