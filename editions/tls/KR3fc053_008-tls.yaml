body:
  text: 法從大餘小餘六百八十四已上其月大注曰六百八十四一月朔虛分也加一月小餘七百七十三滿法成日故月大推冬至置入紀年外所求以餘數乘之滿紀法爲大餘注曰紀下舊脫法字不盡爲小餘以六旬去之命以紀算外天正冬至日也求二十四氣置冬至小餘加大餘十五小餘五百一十五滿二千三百五十六從大餘命如法注曰錢詹事曰二千三百五十六者四因紀法也置餘數三千九十以二十四氣分之各得百二十入又四分之三小餘五百一十五者四因百二十八內餘分三也小餘滿紀法爲日既四因之故亦四因紀法爲日法當云置冬至大餘四其小餘今本脫此四字耳推閏月以閏餘減章歲餘以歲中乘之滿章閏爲一月不盡半法已上亦有一進退以無中月推弦望加大餘七小餘五百五十七半注曰置通法四萬三千二十六以四除之得一萬七百五十六半以日法除之得大餘不盡爲小餘小餘如日法從大餘餘命如前得上弦又加得望又加得下弦又加得後月朔其弦望定小餘四百一以下注曰乾象術不見二十四氣畫夜漏刻黃
