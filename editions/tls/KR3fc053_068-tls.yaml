body:
  text: 十九小餘七百七十三小餘滿日法從大餘命如前求後入月日術注曰後字今增以入月日日餘加舍入月日及餘餘滿日度法得一日其前合朔小餘滿其虛分者減一日後小餘滿七百七十三以上者去二十九日不滿去三十日注曰舊脫去二十九日不滿七字其餘則後合入月日也求後度以度加度度餘加度餘滿日度法得一度木伏三十二日三百四十八萬四千六百四十六分見三百六十六日伏行五度二百五十萬九千九百五十六分見行四十度除逆退十二度定行二十八度火伏一百四十三日九十七萬三千一十三分見六百三十六日伏行一百一十一度四十七萬八千九百九十八分見行三百二十度除逆十七度定行三百三度土伏三十三日十六萬六千二百七十二分見三百四十五度伏行三度一百七十三萬三千一百四十八分
