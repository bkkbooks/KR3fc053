body:
  text: 此小餘以三十二爲母三十二分之七即八十分之十七半也倍之得兩氣大餘三十小餘十四即八十分之三十五以五除之得六日七分以七分轉減八十餘七十三分於乾象術一氣大餘十五小餘五百一十五此小餘以二千三百五十六爲母二千三百五十六分之五百一十五即千一百七十八分之二百五十七半倍之得兩氣大餘三十小餘一千三十即千一百七十八分之五百一十五以五除之得大餘六小餘百三以百三轉減千一百七十八餘小餘千七十五緣乾象斗分少故千一百七十八分之百三較八十分之七爲弱求此卦各加大餘六小餘百三其四正各因其中日而倍其小餘推五行用事置冬至大小餘注曰此亦當置冬至大餘四其小餘加大餘二十七小餘九百二十七滿二千三百五十六從大餘得土用事日也注曰置周天二十一萬五千一百三十以四乘之得八千六萬五百二十以五除之得一十七萬二千一百四爲五行用事積日分以二千三百五十六除之得大餘七十三小餘百一十六爲五行用事日數又置五行用事積日分以四除之得四萬三千二十六爲四時土王積日分以二千三百五十六除之得大餘十八小餘六百一十八爲土王日數又置一氣大餘十五小餘五百一十五以三各乘之得大餘四十五小餘一千五百四十五爲冬至到立春日數以土王日數減之餘大餘二十七小餘九百二十七加大餘十八小餘六百一十八得立春木用事日加大餘七十三小餘百一十六復得土又加土如得其火注曰如讀爲而金水放此推加時
