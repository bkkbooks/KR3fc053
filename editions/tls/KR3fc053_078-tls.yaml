body:
  text: 七分行星三十二度六百四十一萬九百六十七分注曰行星以下十八字舊脫而夕見西方在日前順疾日行一度四分之一二十日行二十五度而順遲日行九分之八九日行行八度畱不行二日旋逆一日退一度在日前夕伏西方逆遲九日退七度與日合凡再合一終一百一十五日六百一萬二千五百五分行星亦如之乾象術下畢甘泉老友江藩校
