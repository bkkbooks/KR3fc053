body:
  text: 日五萬六千九百五十四分行星五十度五萬六千九百五十四分而與日合一合二百九十二日注曰舊脫一合已下六字五萬六千九百五十四分行星亦如之金夕與日合伏順四十一日五萬六千九百五十四分行星五十度五萬六千九百五十四分而夕見西方在日前順疾日行一度九十一分之二十二九十一日行百六度而順遲日行四十六分之三十三四十六日行三十三度畱不行八日旋逆日行五分之三十日退六度在日前夕伏西方逆疾五日退四度注曰舊脫此十四字而與日合凡再合一終五百八十四日十一萬三千九百八分行星亦如之水晨與日合伏逆九日退七度而晨見東方在日後更逆疾一日退一度畱不行二日旋順遲日行九分之八九日行八度而順疾日行一度四分之一二十日行二十五度在日後晨伏東方順十六日六百四十一萬九百六十七分行星三十二度六百四十一萬九百六十七分而與日合一合五十七日六百四十一萬九百六十七分行星亦如之注曰行星三十二度巳下十八字舊誤在行星亦如之上今訂正水夕與日合伏順十六日六百四十一萬九百六十
