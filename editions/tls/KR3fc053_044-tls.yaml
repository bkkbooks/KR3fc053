body:
  text: 率之差也以之加減其日捐益率得次日故曰加減也七日衰下注謂益有當加減三爲不足有下當有一字加字當是衍文損益者所以損益兼數者也八日損率下注舊誤在七日益率下今以意更正云過樗損之者極謂月去黃道極遠已過此數卽須損之半周半厯周也兼數者月去黃道之度分也此度分滿十二成一度一日分日去交近故兼數少一日已後分日已前去交漸遠故兼數漸多八日去交最遠故兼數最多置八日兼數七十三以十二除之得六度一分爲月去黃道極遠之數也又日分損率下當有小分依率推之置月周以分日減之餘二千六百七十一則虛分也以乘分日兼數十一得二萬九千三百八十一以分日除之得五五千二百三分之二千三百六十六子母各以十一約之母得四百七十三則少大法也子得三百六則少大分也以兼數十一得十六又少大分三百六爲分日損率少大法四百七十三厯周十萬七千五百六十五差率萬一千九百八十六朔合分萬八千三百二十八微分九百一十四注曰微舊誤徵下皆同微分法二千二百九推朔八陰陽厯以會月去上元積月餘以朔合分定微分各乘之微分滿其法從合分合分滿周天去之其餘不滿厯周者爲八陽厯注曰上元起陽厯也滿去之注曰滿舊誤餘錢詹事曰當作滿爲八陰厯餘皆如月周得一月算外所求月合朔八厯不盡爲日餘
