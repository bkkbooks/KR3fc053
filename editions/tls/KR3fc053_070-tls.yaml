body:
  text: 見行一十五度除逆六度定行九度金晨伏東方八十二日十一萬三千九百八分見西方二百四十六日除逆六度定行二百四十六度晨伏行百度十一萬三千九百八分見東方日度如西伏十日退八日水晨伏三十三日六百一萬二千五百五分見西方三十二日除逆一度定行三十二度伏行六十五度六百一萬二千五百五分見東方日度如西伏十八日退十四度注曰舊脫此注依上文例增五星厯步以術法伏日度及餘注曰術字當註在上文厯步下加星合日度餘餘滿日度法得一從今注曰今當作全命之如前得星見日及度也以星行分母乘見度餘如日度法得一分不盡半法以上亦得一而日加所行分分滿其母得一度逆順母不同以當行之母乘故分如故母而一注曰舊脫下故字當行分也畱者承前逆則減之伏不書度經升除分以行母爲率分有損益前後相御凡言如盈約滿皆求實之除也去及除之取盡之除也注曰此四語不類正文按鄭康成闞澤並注乾象術今兩家注已遺亡疑此爲舊注賸文也木晨與日合伏順十六日百七十四萬二千三百二
