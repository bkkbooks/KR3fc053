body:
  text: 百八十三小分二十九半分各加法成日日滿二十七日去之餘如周分注曰周分即周日分不足除減一日加周虛求弦望定大小餘置所人厯盈縮積以通周乘之爲實令通數乘日餘分以乘損益率以損益實爲加時盈縮也章歲減月行分乘周半爲差法以除之注曰求加時盈縮者於今有術當以周法爲所有率損益率爲所求率置所有日餘分以通數通餘內分以乘損益率爲實亦以通數乘周法得通周爲法法除實得所求日餘分相當之損益數以損減益加盈縮積爲加時盈縮今不除即以通數乘日餘分以乘損益率之數爲日餘分相當之損益數轉以通周乘盈縮積則兩分觕細相等可以相加減故損益之即爲加時盈縮也又求盈縮日分者於今有術當以章歲減月行分餘爲其日月行去日分爲所有率日法爲一日積分所求率置所有盈縮積以日法乘之爲實以章歲減月行分之餘爲法今此盈縮積以通周乘之此通周爲周半乘日法之數即以日法乘盈縮積又以周半乘之爲實故亦以周半乘章歲減月行分之餘爲法法除實得所有盈縮積相當之日法分又章歲爲一日日行分與其日月行分相減餘爲其日日行月行之差故曰差法也所得盈縮加大小餘注曰月行疾則加時差而早故減月行遲則加時差而晚故加如日法盈不足朔加時在前後日注曰盈則加時在後日不足則加時在前日弦望進退大餘爲定小餘注曰盈則進不足則退又景初等術並有直周日法今依率補之直周日者以通周乘縮積又以少大法乘之爲實以少大法乘損率加少大分七百五十五又以通數乘日餘分以乘之以損實爲加時縮積以章歲減月行分餘以少大法乘之加少大分七百五十五以乘周半爲差法以除之所得加小餘如上法求朔弦望加時定度
