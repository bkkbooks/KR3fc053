body:
  text: 亦得所求益率九餘四千九百三十一故下文云直周日者加餘八百三十七少大分八百九十九也周日列衰少進加少者即餘八百三三十七少大分八百九十九也周日分三千三百三周虛二千六百六十六注曰以周日分減周日法餘爲周虛周日法五千九百六十九通周十八萬五千三十九注曰以通數乘周日法或以周半乘日法得通周厯周十六萬四千四百六十六少大法一千一百一朔行大分萬一千八百一注曰此萬字及下分二十五五字從錢詹事增小分二十五周半一百二十七推合朔入厯以上元積月乘朔行大小分注曰本當以一月之積周日法分乘積月緣滿厯周須去之故即以朔行分乘小分滿通數三十一從大分注曰書脫小分二字大分滿厯周去之餘滿周法得一日注曰周法即周日法不盡爲日餘日餘命笇外所求合朔入厯也求次月加一日日餘五千八百三十二小分二十五注曰置朔行大小分以周日法除之得一日日餘五千八百三十二小分二十五求弦望各加七日日餘二千二百八十三小分二十九半注曰置一弦小餘五百五十七半以周半乘之得七萬八百二半以通數除之得日餘二千二
