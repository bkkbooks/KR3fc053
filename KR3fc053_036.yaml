body:
  text: 四度七分得十四度九分餘四千五十八減餘千三十八得十四度九分餘三千二十而以轉加甲日夜半定行亦得乙日夜半定行二十七度二分餘二千八百五十五直周日者加餘八百三十七又以少大分八百九十九加次秝變衰轉求如前注曰如丙日夜半月行十三度七分人厯二十六日日餘二千六百六十六丁日夜半月行二十六度十四分人厯二十七日日餘二千六百六十六戊日夜夜半月行四十度二分人厯日空日餘五千三百三十二是為直周日者以求月夜半定度法推其定以丙日日餘乘二十七損率十九得五萬六百五十四如周法而一得八餘二千九百二以減二十七日縮積三十一得丙日縮積二十二餘三千六十七以減丙日夜半月行度得丙日夜半定行十二度三分餘二千九百二又以戊日日餘乘一日益率二十二得一十一萬七千三百四如周法而一得十九餘三千八百九十三即為戊日盈積以加戊日夜半月行度得戊日夜半定度四十一度二分餘三千八百九十三以變衰法推之以丙日日餘乘二十七日列衰三得七千九百九十八如周法而一得丙日變衰一餘二千二十九以加二十七日日轉度分十四度七分得十四度八分餘二千二十九而以轉加丙日夜半定行得丁日夜半定行二十六度十一分餘四千九百三十一又置周日轉度分十四度九分餘四千九十三少大分二百二加餘八百三十七少大分八百九十九得十四度九分餘四千九百三十一而以轉丁日夜半定行亦得戊日夜半定行四十一度二分餘三千八百九十三求次日夜半盈縮以變衰減加損益率為變損日益注曰日益當作益率而以轉損益夜半盈縮厯竟損不足反減為八次厯減加餘如上數注曰不直周日亦減餘千三十八如甲日乙日八厯如上求得甲日縮積十四餘一百六十五乙日盈積七餘二千八百五十五又求得甲日變衰二餘四千五十八減餘千三十八得二餘三千
