body:
  text: 十三分行星二度三百二十三萬四千六百七分而晨見東方在日後注曰後上舊衍沒字順疾日行五十八分之十一五十八日行十一度更順遲日行九分五十八日行九度留不行二十五日而旋逆日行七分之一八十四日退十二度復留二十五日而順日行五十八分之九五十八日行九度順疾日行十一分五十八日行十一度在日前夕伏西方十六日百七十四萬二千三百二十三分行星二度三百二十三萬四千六百七分而與日合凡一終三百九十八日三百四十八萬四千六百四十六分行星三十三度二百五十萬九千九百五十六分火晨與日合伏順七十一日有四十八萬九千八百六十八分行星五十五度百二十四萬二千八百六十分半而晨見東方在日後順日行二十三分之十四百八十四日行一百一十二度更順遲日行二十三分之十二九十二日行四十八度留不行十一日旋逆行六十二分之十七六十二日退十七度復留十一日而順注曰此七字今增日行十二分九十二日行四十八度復順疾日行十四分百八十四日行百一十二度在日前夕伏西方七十一日百四十八萬九千
