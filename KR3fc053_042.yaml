body:
  text: 四日四減益十二四十八五日四減益八六十六日三減益四六十八七日三減減不足反損為加謂益有當加減三為不足益一七十二八日四加損二過極損之謂日行半周度已過極則當損之七十三九日四加損六七十一十日三加損十六十五十一日二加損十三五十五十二日一加損十五四十二十三日限餘三千九百一十二微分一千七百一十二此為後限一加厯初大分日損十六二十七分日五千二百而三少加少者損十六大十一注曰前後限者日月食限也求其數者置朔合分一萬八千三百二十八微分九百一十四半之得九千一百六十四微分四百五十七為限分以月周除之得一日日餘一千二百九十微分四百五十七則前限也置一周十三日日餘五千二百三以前限日餘分減之餘十二日日餘三千九百一十二微分一千七百五十二則後限也各取算外故在二日十三日之下今本脫前限一條又微分誤作徵分並依算補正案朔合分為一月月行交過周及日之積度分即為一月日行交之積度分半之為自朔至望或自望至朔日行交之積度分以紀法除限分得十五餘三百二十九微分四百五十七為自朔至望或自望至朔日行交之度數據以為限者古推日月食交在望前則朔日食望月食交在望後則望月食後朔日食交正在朔則日食既前後望不食交正在望則月食既前後朔不食是以朔望相去之數為限故此術以朔望相去日行交之度數為限也分日五千二百而三而辭也猶云二強進少而弱衰者前後二日損益
