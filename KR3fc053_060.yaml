body:
  text: 合月法六萬七千五十一日度法二百七萬八千五百八十一朔大餘五十四注曰積日分五十一萬六千三百一十二積日三百五十四朔小餘五百三十四入月日二十四注曰通法乘月餘得二十三億一千六百六十四萬八千九百一十八合月法乘朔小餘得三千五百八十萬五千二百三十四并之得二十三億五千二百四十五萬四千一百五十二會數約之得日分五千五萬二千二百一十六日餘十六萬六千二百七十二朔虛分九百二十三升分五十一萬一千七百五度數十二注曰度餘分一百二十四積度分二千六百六十七萬六千一百二十度餘一百七十三萬三千一百四十八金周率九千二十二日率七千二百一十三合月數九注曰月分一百六十九萬五千五十五月餘十五萬二千二百九十三合月法十七萬一千四百一十八日度法五百三十一萬三千九百五十八朔大餘二十五注曰積日分三十八萬七千二百三十四積日二百六十五
