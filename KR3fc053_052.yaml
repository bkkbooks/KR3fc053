body:
  text: 李鋭述并注上元已丑以來至建安十一年景戍歲積七千三百七十八已丑戊寅丁卯景辰乙巳甲午癸未壬申辛酉庚戌已亥戊子丁丑景寅注曰此上元以來每紀紀首歲名也置紀法五百八十九以六十去之餘四十九命起元首已丑算外得戊寅又置四十九命起戊寅算外得丁卯它皆放此已丑丁卯之等為內紀戊寅丙辰之等為外紀建安十一年丙戌入丁丑紀兼及丙寅者丁丑內紀丙寅外紀也推五星五行木歲星火熒惑土填星金太白水辰星各以終日與天度相約為日率注曰當云為周率日率章歲乘周為月法章月乘日為月分分如法為月數通數乘月法日度法也注曰本當以紀法乘周率為日度法今此月法月法為章歲乘周率之數紀法為通數乘章歲之數則以通數乘月法即如以紀法乘周率也什分注曰什舊誤升錢詹事曰此篇云什分者皆斗分之訛隸書斗作升傳寫易混乘周率為什分曰度法用紀法乘周率故此同以分乘之注曰周率舊誤同率五星朔大餘小餘以通法各乘月數日法各除之為大餘不盡為小餘以六十去大餘五星入月日日餘各以通法乘月餘以合月法乘朔小餘并之會數約之所得各以日度法除之則皆是注曰月法下舊脫乘字朔小餘為通數乘會數之分以乘月法會數約之所得為通數
