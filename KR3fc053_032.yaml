body:
  text: 以章歲乘加時盈縮差法除之所得滿會數為盈縮大小注曰為盈縮大小當云為盈縮大分不盡為小分以差法除加時盈縮所得為日法分今以章歲乘加時盈縮差法除之即如先除得日法分又以章歲乘之也又日法為通數乘會數之數則以章歲乘日法即如以章歲乘通數又乘會數也又紀法為章歲乘通數之數則以章歲乘通數又乘會數即如以紀法乘會數也是章歲乘日法即如以紀法乘會數章歲乘日法分即如以紀法分乘會數故以會數除所得為大分不盡為小分以盈減縮加本日月所在注曰月行疾則未及合朔之度已及日故減月行遲則過合朔之度乃及日故加弦望同義盈不足以紀法進退度為日月所在定度分推月行夜班入厯以周半乘朔小餘如通數而一以減人厯日餘餘不足加周法而減速焉却一日注曰減一日也却得周日加其分注曰謂不加周法而加周分即得夜半入厯求此日轉一日注曰轉加一日也因日餘到二十七日日餘滿周日分去之不直周日也其不滿直之加周虛於餘餘者次日八厯日餘也求月夜半定度以夜半八厯日餘乘損益率如周法得一不盡為餘注曰此今有術也所得者所有日餘相當之益損數也以損益盈縮積餘無所損破全為法損之為夜半盈縮也滿章歲為度不盡為分通數乘分及餘餘如周法從分注曰以通數乘章歲分得紀法
